# 3. Tables go at the bottom
[theme]
name = "material"
custom_dir = "overrides"
features = [
    "navigation.tabs",
    "navigation.indexes",
    "navigation.footer"
]

plugins = [
    "search",
    "markmap"
]

markdown_extensions = [
    "attr_list",
    "fenced_code",
    "tables"

]

logo = "img/goc-tieng-viet-logo.png"
favicon = "img/goc-tieng-viet-logo.png"

